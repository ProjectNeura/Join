<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Project Neura Careers</title>
    <meta name="description" content="Project Neura application portal">
    <link rel="icon" href="https://raw.githubusercontent.com/ProjectNeura/ProjectNeura/refs/heads/master/img/logo.svg">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <a class="brand" href="/" data-link>
          <span class="brand-mark" aria-hidden="true">
            <img src="https://raw.githubusercontent.com/ProjectNeura/ProjectNeura/refs/heads/master/img/logo_nobg.svg" alt="">
          </span>
          <span>
            <strong>Project Neura</strong>
            <small>Careers portal</small>
          </span>
        </a>
        <nav class="nav" aria-label="Primary">
          <a href="/" data-link>Jobs</a>
          <a href="/check" data-link>Check application</a>
          <a href="https://projectneura.org" target="_blank" rel="noopener noreferrer">Home</a>
        </nav>
      </header>
      <main id="app" class="app" tabindex="-1"></main>
    </div>
    <template id="job-card-template">
      <article class="job-card">
        <div>
          <p class="eyebrow"></p>
          <h2></h2>
          <div class="summary"></div>
          <div class="meta"></div>
        </div>
        <a class="button primary" data-link>Apply</a>
      </article>
    </template>
    <script src="/app.js" type="module"></script>
  </body>
</html>
